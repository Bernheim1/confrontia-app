<div class="w-full">
  <div *ngIf="caso || cargandoCaso" class="max-w-6xl mx-auto mb-6 px-6 py-4 rounded-xl border bg-white dark:bg-gray-800 border-gray-200 dark:border-gray-700 shadow-sm">
    <div *ngIf="cargandoCaso" class="text-sm text-gray-500 dark:text-gray-400">Cargando datos del caso asociado...</div>
    <div *ngIf="caso && !cargandoCaso" class="flex flex-col gap-1">
      <span class="text-xs font-semibold uppercase tracking-wider text-primary-600 dark:text-primary-300">Caso asociado</span>
      <span class="text-base font-semibold text-gray-900 dark:text-gray-100">{{ caso.caratulaExpediente }}</span>
      <span class="text-sm text-gray-600 dark:text-gray-400">Expediente N° {{ caso.numeroExpediente || 'Sin número' }}</span>
    </div>
  </div>

  <div *ngIf="this.step == 0">
    <app-ingreso-oficio class="scale-up-ver-top" (oficioConfigurado)="onOficioConfigurado($event)"></app-ingreso-oficio>
  </div>

  <div *ngIf="this.step == 1">
    <div *ngFor="let oficio of oficios; let i = index" class="mb-6">
      <app-seleccion-oficio
        (oficioSeleccionado)="onOficioSeleccionado($event)"
        (formularioCompletado)="onFormularioCompletado($event)"
        (reingresar)="onReingresar()"
        [proveido]="oficio.proveido"
        [tipoOficio]="this.tipoOficio!"
        [index]="i"
        [masivo]="oficios.length > 1"
        [totalOficios]="oficios.length"
        [oficiosCompletados]="formulariosValidos.size"
        [caso]="caso"
        [casoId]="casoId">
      </app-seleccion-oficio>
    </div>

    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[60] flex gap-3">
      <button type="button" (click)="generarTodos()" class="px-6 py-3 text-white bg-primary-600 hover:bg-primary-700 active:bg-primary-800 rounded-xl font-medium shadow-xl transition-all duration-200 hover:scale-[1.02]">
        <span>Generar <span class="font-bold">{{ tipoOficio?.label }}</span></span>
      </button>
      <button type="button" (click)="onReingresar()"
        class="px-4 py-3 text-white bg-gray-600 hover:bg-gray-700 active:bg-gray-800 rounded-xl shadow-xl transition-all duration-200 hover:scale-[1.02]"
        title="Reingresar">
        <fa-icon [icon]="faRepeat"></fa-icon>
      </button>
    </div>
  </div>

  <div *ngIf="this.step == 2">
    <div *ngFor="let oficio of oficios; let i = index" class="mb-6">
      <app-mostrar-oficio
        (reingresar)="onReingresar()"
        [documento]="this.documentos[i]"
        [masivo]="oficios.length > 1">
      </app-mostrar-oficio>
    </div>
  </div>
</div>
