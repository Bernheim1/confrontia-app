<div class="p-6 sm:p-8 bg-white dark:bg-gray-800 rounded-xl border shadow-sm mb-6 overflow-hidden transition-all duration-300">
  <!-- Botón Volver -->
  <div class="mb-4">
    <button 
      type="button"
      (click)="volver()"
      class="text-sm text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-200 transition-colors flex items-center gap-2">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
      </svg>
      Volver a la lista
    </button>
  </div>
  
  <form [formGroup]="estudioForm">
    <div class="max-w-7xl mx-auto">
      <div class="grid grid-cols-12 gap-6 mb-6">
        <div class="col-span-12">
          <div class="bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-gray-100 rounded-xl border border-gray-200 dark:border-gray-600 shadow-sm overflow-hidden">
            <div class="border-b px-4 py-3 text-center bg-gray-100 dark:bg-gray-800 border-gray-200 dark:border-gray-600">
              <h4 class="font-semibold">{{createAction ? 'Crear' : 'Modificar'}} Estudio</h4>
            </div>

            <div class="p-5">
              <div class="grid grid-cols-12 gap-4">
                <div class="col-span-6">
                  <label class="block text-sm font-medium mb-1">Nombre del Estudio</label>
                  <div class="relative" tabindex="0" >
                    <input type="text"
                      class="w-full dark:bg-gray-600 dark:text-white rounded-md border border-gray-300 dark:border-gray-500 px-3 py-2 mb-2 focus:ring-2 focus:ring-primary focus:border-primary"
                      placeholder="Nombre del Estudio" formControlName="nombre" />
                  </div>
                </div>

                <div class="col-span-6">
                  <label class="block text-sm font-medium mb-1">Dirección</label>
                  <input type="text" class="w-full dark:bg-gray-600 dark:text-white rounded-md border border-gray-300 dark:border-gray-500 px-3 py-2 focus:ring-2 focus:ring-primary focus:border-primary"
                    placeholder="Dirección" formControlName="direccion" />
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Configuración MEV -->
        <div class="col-span-12">
          <div class="bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-gray-100 rounded-xl border border-gray-200 dark:border-gray-600 shadow-sm overflow-hidden">
            <div class="border-b px-4 py-3 text-center bg-gray-100 dark:bg-gray-800 border-gray-200 dark:border-gray-600">
              <h4 class="font-semibold">Configuración MEV (Mesa de Entradas Virtual)</h4>
            </div>

            <div class="p-5">
              <div class="grid grid-cols-12 gap-4">
                <div class="col-span-12">
                  <label class="flex items-center cursor-pointer">
                    <input type="checkbox" formControlName="mevEnabled" 
                      class="w-4 h-4 text-primary-600 bg-gray-100 border-gray-300 rounded focus:ring-primary-500 dark:focus:ring-primary-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600" />
                    <span class="ml-2 text-sm font-medium">Habilitar integración MEV</span>
                  </label>
                </div>

                <div class="col-span-6">
                  <label class="block text-sm font-medium mb-1">Usuario MEV</label>
                  <input type="text" formControlName="mevUsername" placeholder="Usuario MEV" 
                    [disabled]="!estudioForm.controls['mevEnabled'].value"
                    class="w-full dark:bg-gray-600 dark:text-white rounded-md border border-gray-300 dark:border-gray-500 px-3 py-2 focus:ring-2 focus:ring-primary focus:border-primary disabled:opacity-50 disabled:cursor-not-allowed" />
                </div>

                <div class="col-span-6">
                  <label class="block text-sm font-medium mb-1">Contraseña MEV</label>
                  <input type="password" formControlName="mevPassword" placeholder="Contraseña MEV" 
                    [disabled]="!estudioForm.controls['mevEnabled'].value"
                    class="w-full dark:bg-gray-600 dark:text-white rounded-md border border-gray-300 dark:border-gray-500 px-3 py-2 focus:ring-2 focus:ring-primary focus:border-primary disabled:opacity-50 disabled:cursor-not-allowed" />
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="col-span-12">
          <app-firma-abogado-config
            [estudioId]="estudioId"
            (componentFormInstance)="firmaForm = $event">
          </app-firma-abogado-config>
        </div>
        
      </div>
    </div>
    <button 
      type="submit"
      (click)="createAction ? create() : update()"
      class="bg-primary-600 float-right hover:bg-primary-700 active:bg-primary-800 text-white py-2 px-5 rounded-lg font-medium text-sm shadow-md hover:shadow-lg transition-all duration-200 hover:scale-[1.02] whitespace-nowrap min-w-[120px]">
      {{createAction ? 'Crear' : 'Modificar'}}
    </button>
  </form>
</div>
